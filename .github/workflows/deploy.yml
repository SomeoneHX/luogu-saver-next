name: Auto Deploy with OSS
permissions:
    contents: read

on:
    push:
        branches:
            - master
    workflow_dispatch:

concurrency:
    group: production-deployment
    cancel-in-progress: false

jobs:
    deploy-backend:
        runs-on: ubuntu-latest
        environment: production
        steps:
            - uses: actions/checkout@v6.0.1
            - uses: actions/setup-node@v6.1.0
              with:
                  node-version: 22
                  cache: npm

            - name: Validate deployment configuration
              env:
                  SERVER_HOST: ${{ secrets.SERVER_B_HOST }}
                  SERVER_PASSWORD: ${{ secrets.SERVER_B_PASSWORD }}
              run: |
                  test -n "$SERVER_HOST"
                  test -n "$SERVER_PASSWORD"

            - name: Install & Build Backend
              run: |
                  npm ci
                  npm run build -w @luogu-saver-next/markdown-renderer
                  npm run build -w @luogu-saver-next/backend

            - name: Package Markdown Renderer
              run: |
                  npm pack -w @luogu-saver-next/markdown-renderer --pack-destination packages/backend
                  mv packages/backend/luogu-saver-next-markdown-renderer-*.tgz packages/backend/markdown-renderer.tgz

            - name: Deploy Backend
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.SERVER_B_HOST }}
                  username: root
                  password: ${{ secrets.SERVER_B_PASSWORD }}
                  source: 'packages/backend/dist,packages/backend/scripts,packages/backend/package.json,packages/backend/markdown-renderer.tgz'
                  target: '/opt/luogu-saver-backend'
                  strip_components: 2

            - name: Restart Backend Service
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_B_HOST }}
                  username: root
                  password: ${{ secrets.SERVER_B_PASSWORD }}
                  script: |
                      export NVM_DIR="$HOME/.nvm"
                      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

                      cd /opt/luogu-saver-backend

                      npm install --omit=dev
                      npm install --omit=dev --no-save ./markdown-renderer.tgz
                      node -e "require('./dist/config')"

                      pm2 describe luogu-backend > /dev/null
                      if [ $? -eq 0 ]; then
                        pm2 reload luogu-backend
                        echo "✅ PM2 Reloaded"
                      else
                        # 确保指向 dist/index.js
                        pm2 start dist/index.js --name "luogu-backend" --node-args="--env-file=.env" --update-env
                        pm2 save
                        echo "✅ PM2 Started"
                      fi

                      exit 0

    deploy-frontend:
        runs-on: ubuntu-latest
        environment: production
        needs: deploy-backend
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.1

            - name: Setup Node
              uses: actions/setup-node@v6.1.0
              with:
                  node-version: 22
                  cache: npm

            - name: Validate deployment configuration
              env:
                  SERVER_HOST: ${{ secrets.SERVER_A_HOST }}
                  SERVER_PASSWORD: ${{ secrets.SERVER_A_PASSWORD }}
                  OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
                  OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
                  OSS_DOMAIN: ${{ secrets.OSS_DOMAIN }}
                  OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
                  OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
              run: |
                  test -n "$SERVER_HOST"
                  test -n "$SERVER_PASSWORD"
                  test -n "$OSS_ENDPOINT"
                  test -n "$OSS_BUCKET"
                  test -n "$OSS_DOMAIN"
                  test -n "$OSS_KEY_ID"
                  test -n "$OSS_KEY_SECRET"

            - name: Install Dependencies
              run: npm ci

            - name: Build Frontend
              run: npm run build -w @luogu-saver-next/frontend
              env:
                  VITE_API_URL: ${{ secrets.BACKEND_API_URL }}
                  VITE_CDN_URL: ${{ secrets.OSS_DOMAIN }}/luogu-saver/

            - name: Upload Assets to S3
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.OSS_KEY_SECRET }}
                  AWS_DEFAULT_REGION: us-east-1
              run: |
                  aws s3 sync packages/frontend/dist s3://${{ secrets.OSS_BUCKET }}/luogu-saver/ \
                    --endpoint-url ${{ secrets.OSS_ENDPOINT }} \
                    --acl public-read \
                    --delete \
                    --exclude "index.html"

            - name: Deploy Frontend
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.SERVER_A_HOST }}
                  username: root
                  password: ${{ secrets.SERVER_A_PASSWORD }}
                  source: 'packages/frontend/dist/*'
                  target: '/opt/luogu-saver-frontend'
                  strip_components: 3
