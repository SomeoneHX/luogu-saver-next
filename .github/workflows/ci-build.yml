name: CI Build

permissions:
    contents: read

on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.1

            - name: Setup Node
              uses: actions/setup-node@v6.1.0
              with:
                  node-version: 22
                  cache: npm

            - name: Install Dependencies
              run: npm ci

            - name: Build Markdown Renderer
              run: npm run build -w @luogu-saver-next/markdown-renderer

            - name: Build Backend
              run: npm run build -w @luogu-saver-next/backend

            - name: Build Frontend
              run: npm run build -w @luogu-saver-next/frontend
