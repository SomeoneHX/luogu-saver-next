name: CI Typecheck

permissions:
    contents: read

on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master

jobs:
    frontend-typecheck:
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.1

            - name: Setup Node
              uses: actions/setup-node@v6.1.0
              with:
                  node-version: 22
                  cache: npm

            - name: Install Dependencies
              run: npm ci

            - name: Typecheck Frontend
              run: npx vue-tsc -p packages/frontend/tsconfig.app.json --noEmit
