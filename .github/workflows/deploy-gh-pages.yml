name: Deploy to GitHub Pages

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Branch to build from (default: deploy)'
                required: true
                default: 'deploy'
                type: string
    push:
        branches:
            - deploy

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.1
              with:
                  ref: ${{ inputs.branch || 'deploy' }}

            - uses: actions/setup-node@v6.1.0
              with:
                  node-version: 22

            - run: npm install

            - name: Build for GitHub Pages
              run: npm run build -w @luogu-saver-next/frontend
              env:
                  VITE_GITHUB_PAGES: 'true'
                  VITE_API_URL: ${{ secrets.BACKEND_API_URL }}

            - name: Copy index.html to 404.html (SPA fallback)
              run: cp packages/frontend/dist/index.html packages/frontend/dist/404.html

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: packages/frontend/dist

            - name: Deploy to GitHub Pages
              uses: actions/deploy-pages@v4
